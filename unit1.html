<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大貴段合購案 | 兩萬坪別墅莊園 ‧ 森林工藝</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;900&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --forest-deep: #1B3022;
            --forest-mid: #3E5C46;
            --gold-accent: #b5a478;
            --paper-texture: #F9F8F4;
            --text-dark: #2C332D;
            --bg-dark-section: #0F1A13;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            background-color: var(--paper-texture);
            color: var(--text-dark);
            font-family: 'Noto Sans TC', sans-serif;
            line-height: 1.8;
            overflow-x: hidden;
        }

        h1, h2, h3, h4, .serif { font-family: 'Noto Serif TC', serif; font-weight: 900; }

        /* --- 頂部導覽列 --- */
        .top-nav {
            position: fixed;
            top: 0; width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            z-index: 10000;
            padding: 12px 5%;
            display: flex;
            justify-content: center;
            border-bottom: 1px solid rgba(27, 48, 34, 0.1);
        }
        .top-nav a {
            text-decoration: none;
            color: var(--forest-deep);
            font-size: 0.8rem;
            font-weight: 700;
            margin: 0 10px;
            letter-spacing: 1px;
        }

        /* --- Hero & 輪播樣式 --- */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            position: relative;
            padding: 0 8%;
            overflow: hidden;
        }

        .carousel-bg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
        }

        .carousel-item {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            animation: carouselFade 30s infinite;
        }

        .hero::after {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(to right, rgba(249, 248, 244, 0.98) 30%, rgba(249, 248, 244, 0.4) 100%);
            z-index: 0;
        }

        .hero-content { position: relative; z-index: 2; }

        /* 輪播圖片路徑 */
        .carousel-item:nth-child(1) { background-image: url('https://raw.githubusercontent.com/hao713949/Dagui-Section/main/villa.jpg'); animation-delay: 0s; }
        .carousel-item:nth-child(2) { background-image: url('https://raw.githubusercontent.com/hao713949/Dagui-Section/main/villa0.jpg'); animation-delay: 5s; }
        .carousel-item:nth-child(3) { background-image: url('https://raw.githubusercontent.com/hao713949/Dagui-Section/main/villa1.jpg'); animation-delay: 10s; }
        .carousel-item:nth-child(4) { background-image: url('https://raw.githubusercontent.com/hao713949/Dagui-Section/main/villa2.jpg'); animation-delay: 15s; }
        .carousel-item:nth-child(5) { background-image: url('https://raw.githubusercontent.com/hao713949/Dagui-Section/main/villa3.jpg'); animation-delay: 20s; }
        .carousel-item:nth-child(6) { background-image: url('https://raw.githubusercontent.com/hao713949/Dagui-Section/main/villa4.jpg'); animation-delay: 25s; }

        @keyframes carouselFade {
            0% { opacity: 0; }
            5% { opacity: 1; }
            16% { opacity: 1; }
            21% { opacity: 0; }
            100% { opacity: 0; }
        }

        .hero h1 { font-size: clamp(2.2rem, 8vw, 4.2rem); color: var(--forest-deep); letter-spacing: 8px; line-height: 1.3; }

        .query-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 28px;
            background-color: var(--forest-deep);
            color: var(--gold-accent);
            text-decoration: none;
            border: 1px solid var(--gold-accent);
            border-radius: 4px;
            font-weight: 700;
        }

        section { padding: 80px 8% 60px 8%; border-bottom: 1px solid rgba(0,0,0,0.03); }
        .section-tag { font-size: 0.75rem; letter-spacing: 4px; color: var(--gold-accent); font-weight: 700; }
        
        .grid-layout { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .info-card { background: #fff; padding: 35px; border-radius: 4px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); }

        /* --- 建築規範 --- */
        .reg-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .reg-box { background-color: var(--forest-deep); padding: 40px 15px; text-align: center; border-radius: 4px; }
        .reg-num { color: var(--gold-accent); font-size: 2.2rem; font-weight: 900; display: block; }
        .reg-title { color: #fff; font-weight: 700; }
        .reg-desc { color: rgba(255,255,255,0.8); font-size: 0.85rem; }

        /* --- 表格 --- */
        .table-container { background: white; padding: 20px; border-radius: 8px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { background: var(--forest-deep); color: white; padding: 15px; text-align: left; }
        td { padding: 15px; border-bottom: 1px solid #f0f0f0; }

        /* --- 地圖區域 --- */
        .map-container { width: 100%; height: 450px; margin-top: 30px; border: 1px solid #eee; }
        .map-btn { 
            display: inline-block; 
            padding: 15px 40px; 
            background: var(--forest-deep); 
            color: var(--gold-accent); 
            text-decoration: none; 
            font-weight: 700; 
            margin-top: 1.5rem; 
            border-radius: 2px;
        }

        @media (max-width: 768px) {
            .reg-grid { grid-template-columns: repeat(2, 1fr); }
            .reg-box:last-child { grid-column: span 2; }
        }
    </style>
</head>
<body>

    <nav class="top-nav">
        <a href="#page1">首頁</a>

    <header class="hero" id="page1">
        <div class="carousel-bg">
            <div class="carousel-item"></div>
            <div class="carousel-item"></div>
            <div class="carousel-item"></div>
            <div class="carousel-item"></div>
            <div class="carousel-item"></div>
            <div class="carousel-item"></div>
        </div>
        <div class="hero-content">
            <h1 class="serif">大貴段<br>森林莊園合購案</h1>

            <a href="https://hao713949.github.io/DAKENG-VILLA/project/unit.html" class="query-btn">單元資料查詢 ⇄</a>
        </div>
    </header>

    <section id="page8">

            <iframe

                width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy">
            </iframe>
        </div>
        
        <a href="https://www.google.com/maps/dir/?api=1&destination=24.166299,120.735626" target="_blank" rel="noopener noreferrer" class="map-btn">
            開啟 Google 地圖導航 ↗

    <footer style="padding: 60px 8%; text-align: center; background: #fff;">
        <p class="serif">大貴段別墅莊園 ‧ 專案代理</p>
        <p style="color: #ccc; font-size: 0.75rem; margin-top: 10px;">© 2026 PRECIOUS LAND COLLECTION</p>
    </footer>

</body>
</html>
