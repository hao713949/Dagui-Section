<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大貴段合購案 | 兩萬坪別墅莊園 ‧ 森林工藝</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;900&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --forest-deep: #1B3022;       /* 標題深綠 */
            --forest-mid: #3E5C46;        /* 輔助綠色 */
            --gold-accent: #b5a478;       /* 指定香檳金 */
            --paper-texture: #F9F8F4;     /* 背景底色 */
            --text-dark: #2C332D;          /* 內文顏色 */
            --bg-dark-section: #0F1A13;   /* 交易安全深背景 */
            --danger-red: #8B0000;        /* 警示紅 */
        }

        /* 基礎優化 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            background-color: var(--paper-texture);
            color: var(--text-dark);
            font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.8;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }

        h1, h2, h3, h4, .serif { font-family: 'Noto Serif TC', serif; font-weight: 900; }

        /* --- 頂部導覽列 --- */
        .top-nav {
            position: fixed;
            top: 0; width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            z-index: 10000;
            padding: 12px 5%;
            display: flex;
            justify-content: center;
            border-bottom: 1px solid rgba(27, 48, 34, 0.1);
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none; 
        }
        .top-nav::-webkit-scrollbar { display: none; }
        
        .top-nav a {
            text-decoration: none;
            color: var(--forest-deep);
            font-size: 0.8rem;
            font-weight: 700;
            margin: 0 10px;
            letter-spacing: 1px;
            transition: color 0.3s ease;
        }
        .top-nav a:hover { color: var(--gold-accent); }

        /* --- 按鈕樣式 --- */
        .query-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 28px;
            background-color: var(--forest-deep);
            color: var(--gold-accent);
            text-decoration: none;
            border: 1px solid var(--gold-accent);
            border-radius: 4px;
            font-family: 'Noto Serif TC', serif;
            font-weight: 700;
            font-size: 0.95rem;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* --- Hero 輪播 --- */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            position: relative;
            padding: 0 8%;
            overflow: hidden;
        }
        .carousel-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .carousel-item {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            animation: carouselFade 30s infinite;
        }
        .hero::after {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(to right, rgba(249, 248, 244, 0.98) 30%, rgba(249, 248, 244, 0.4) 100%);
            z-index: 0;
        }
        .hero-content { position: relative; z-index: 2; }

        .carousel-item:nth-child(1) { background-image: url('https://raw.githubusercontent.com/hao713949/Dagui-Section/main/villa.jpg'); animation-delay: 0s; }
        .carousel-item:nth-child(2) { background-image: url('https://raw.githubusercontent.com/hao713949/Dagui-Section/main/villa0.jpg'); animation-delay: 5s; }
        .carousel-item:nth-child(3) { background-image: url('https://raw.githubusercontent.com/hao713949/Dagui-Section/main/villa1.jpg'); animation-delay: 10s; }
        .carousel-item:nth-child(4) { background-image: url('https://raw.githubusercontent.com/hao713949/Dagui-Section/main/villa2.jpg'); animation-delay: 15s; }
        .carousel-item:nth-child(5) { background-image: url('https://raw.githubusercontent.com/hao713949/Dagui-Section/main/villa3.jpg'); animation-delay: 20s; }
        .carousel-item:nth-child(6) { background-image: url('https://raw.githubusercontent.com/hao713949/Dagui-Section/main/villa4.jpg'); animation-delay: 25s; }

        @keyframes carouselFade {
            0% { opacity: 0; }
            5% { opacity: 1; }
            16% { opacity: 1; }
            21% { opacity: 0; }
            100% { opacity: 0; }
        }

        /* --- 區塊樣式 --- */
        section { padding: 80px 8% 60px 8%; position: relative; border-bottom: 1px solid rgba(0,0,0,0.03); }
        .section-tag { font-size: 0.75rem; letter-spacing: 4px; color: var(--gold-accent); display: block; margin-bottom: 15px; font-weight: 700; }
        h2 { font-size: clamp(1.8rem, 5vw, 2.6rem); color: var(--forest-deep); margin-bottom: 40px; }

        /* --- 投資觀點區塊 (New) --- */
        .invest-insight-section { padding: 40px 8% 60px 8%; background-color: #f4f3ee; }
        .invest-insight-box {
            background: var(--forest-deep);
            color: #fff;
            padding: 50px 40px;
            border-radius: 4px;
            border-left: 8px solid var(--gold-accent);
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
        }
        .invest-tag-new {
            font-size: 1.1rem;
            letter-spacing: 4px;
            color: var(--gold-accent);
            display: block;
            margin-bottom: 20px;
            font-weight: 900;
        }
        .invest-title-new {
            font-size: clamp(1.6rem, 4vw, 2.2rem); 
            margin-bottom: 25px;
            line-height: 1.4;
        }
        .small-caption {
            font-size: 0.95rem; /* 字體調小 */
            color: rgba(255, 255, 255, 0.7);
            font-weight: 400;
            display: block;
            margin-top: 10px;
        }

        /* --- 地圖 --- */
        .map-container { width: 100%; height: 450px; margin-top: 30px; border: 1px solid #eee; }
        .map-btn { display: inline-block; padding: 15px 40px; background: var(--forest-deep); color: var(--gold-accent); text-decoration: none; font-weight: 700; margin-top: 1.5rem; border-radius: 2px; }

        @media (max-width: 768px) {
            section { padding: 60px 5% 40px 5%; }
            .invest-insight-box { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <nav class="top-nav">
        <a href="#page1">首頁</a>
        <a href="#page2">項目利多</a>
        <a href="#page3">建築規範</a>
        <a href="#market-info">市場資訊</a>
        <a href="#invest-insight">投資觀點</a>
        <a href="#page8">地理位置</a>
    </nav>

    <header class="hero" id="page1">
        <div class="carousel-bg">
            <div class="carousel-item"></div><div class="carousel-item"></div>
            <div class="carousel-item"></div><div class="carousel-item"></div>
            <div class="carousel-item"></div><div class="carousel-item"></div>
        </div>
        <div class="hero-content">
            <h1 class="serif">大貴段<br>森林莊園合購案</h1>
            <p style="font-weight:700; color:var(--forest-deep);">近兩萬坪別墅聚落 ‧ 48單元規劃</p>
            <a href="https://hao713949.github.io/DAKENG-VILLA/project/unit.html" class="query-btn">認購單元查詢 ⇄</a>
        </div>
    </header>

    <section id="invest-insight" class="invest-insight-section">
        <div class="invest-insight-box">
            <span class="invest-tag-new serif">INVESTMENT PERSPECTIVE</span>
            <h3 class="invest-title-new serif">跟隨百億資本的眼光</h3>
            <p class="invest-content-new">
                「當巨頭已為天花板定調，您只需選擇最正確的入場方式。」
                <span class="small-caption">透過結構化合購，在大開發時代與先行者並肩，實現資產價值的階梯式躍升。</span>
            </p>
        </div>
    </section>

    <section id="page8">
        <span class="section-tag">LOCATION</span>
        <h2 class="serif">莊園地理位置</h2>
        <p style="font-size: 1.1rem; font-weight: 500; margin-bottom: 20px;">台中市北屯區大貴段（大坑風景區 ‧ 貴城巷周邊）</p>
        
        <div class="map-container">
            <iframe 
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3639.627267595289!2d120.7358!3d24.1849!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3469178822509171%3A0x6739678e24445210!2z6Ie65Lit5biC5YyX5bGv5Y2A5aSn6LK05q61!5e0!3m2!1szh-TW!2stw!4v1713430000000!5m2!1szh-TW!2stw" 
                width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy">
            </iframe>
        </div>
        
        <a href="https://www.google.com/maps/search/?api=1&query=24.1849,120.7358" target="_blank" rel="noopener noreferrer" class="map-btn">
            開啟 Google 地圖導航 ↗
        </a>
    </section>

    <footer style="padding: 60px 8%; text-align: center; background: #fff;">
        <p class="serif">大貴段別墅莊園 ‧ 專案代理</p>
        <p style="color: #ccc; font-size: 0.75rem; margin-top: 10px;">© 2026 PRECIOUS LAND COLLECTION</p>
    </footer>

</body>
</html>
