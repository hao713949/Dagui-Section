<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>認購單元資料 | 大貴段森林莊園</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;900&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --forest-deep: #1B3022; --forest-mid: #3E5C46; --gold-accent: #b5a478;
            --paper-texture: #F9F8F4; --text-dark: #2C332D; --contrast-bg: #142118; 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--paper-texture); color: var(--text-dark); font-family: 'Noto Sans TC', sans-serif; line-height: 1.6; }
        h1, h2, h3, .serif { font-family: 'Noto Serif TC', serif; font-weight: 900; }
        .top-nav { background: #fff; padding: 12px 5%; text-align: center; border-bottom: 1px solid rgba(27, 48, 34, 0.1); position: sticky; top: 0; z-index: 1000; }
        
        /* 驗證區 */
        .auth-overlay { width: 90%; max-width: 400px; margin: 60px auto; padding: 40px 30px; background: #fff; box-shadow: 0 20px 40px rgba(0,0,0,0.05); text-align: center; border-radius: 8px; }
        .auth-overlay input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; font-size: 16px; border-radius: 4px; outline: none; border-color: var(--gold-accent); }
        .auth-btn { width: 100%; padding: 16px; background: var(--forest-deep); color: var(--gold-accent); border: none; font-weight: 700; cursor: pointer; letter-spacing: 2px; border-radius: 4px; }
        
        #protected-content { display: none; padding: 30px 5%; max-width: 1000px; margin: 0 auto; }
        .section-header { border-left: 5px solid var(--gold-accent); padding-left: 15px; margin-bottom: 30px; }
        
        /* 數據卡片 */
        .data-summary { display: grid; grid-template-columns: 1fr; gap: 15px; margin-bottom: 30px; }
        .data-card { background: #fff; padding: 25px 15px; text-align: center; border-radius: 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .data-val { font-family: 'Noto Serif TC', serif; font-size: 2rem; color: var(--gold-accent); font-weight: 900; }
        .data-label { font-size: 0.85rem; color: var(--forest-mid); margin-bottom: 8px; }

        /* 圖片堆疊 */
        .photo-stack { display: flex; flex-direction: column; gap: 30px; margin-bottom: 40px; }
        .photo-item { background: #fff; padding: 20px; border-radius: 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); text-align: center; }
        .photo-item img { width: 100%; height: auto; border-radius: 2px; margin-top: 15px; display: block; border: 1px solid #eee; cursor: zoom-in; }
        .photo-caption { font-weight: 700; color: var(--forest-deep); font-size: 1.1rem; border-bottom: 1px solid #eee; padding-bottom: 10px; }

        /* 表格區 */
        .table-wrap { background: #fff; padding: 20px 15px; border-radius: 4px; overflow-x: auto; margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th { background: #f8f9f8; color: var(--forest-deep); padding: 15px 10px; text-align: left; border-bottom: 2px solid var(--gold-accent); }
        td { padding: 15px 10px; border-bottom: 1px solid #f0f0f0; }

        /* 權益卡片 */
        .rights-card { background: #fff; padding: 25px; border-radius: 4px; border-top: 3px solid var(--gold-accent); margin-bottom: 20px; }
        .rights-card h3 { margin-bottom: 10px; color: var(--forest-deep); }
        .rights-card p { font-size: 0.95rem; color: #666; margin-top: 10px; }
        .rights-card.high-contrast { background: var(--contrast-bg); color: #e0e0e0; }
        .rights-card.high-contrast p { color: #aaa; }
        .gold-highlight { color: var(--gold-accent); font-weight: 700; font-size: 1.2rem; }

        .lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center; }
        .lightbox img { max-width: 95%; max-height: 90vh; }

        @media (min-width: 768px) {
            .data-summary { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>
<body>
    <nav class="top-nav"><span class="serif">大貴段森林莊園 ‧ 單元查詢</span></nav>

    <div id="auth-box" class="auth-overlay">
        <h3 id="auth-title" class="serif">單元資料私密存取</h3>
        <p id="auth-hint" style="font-size: 0.85rem; color: #888; margin-bottom: 20px;"></p>
        <input type="password" id="pass-input" placeholder="請輸入授權密碼">
        <button class="auth-btn" onclick="validate()">確認進入</button>
        <p id="error" style="color: #c0392b; display: none; margin-top: 15px;">驗證失敗：密碼錯誤</p>
    </div>

    <main id="protected-content">
        <div class="section-header">
            <h2 id="display-id" class="serif"></h2>
            <p id="display-title" style="color: var(--gold-accent); font-weight: 700;"></p>
        </div>

        <div class="data-summary">
            <div class="data-card"><p class="data-label">總 價</p><p class="data-val"><span id="val-price"></span><span style="font-size: 1rem;">萬</span></p></div>
            <div class="data-card"><p class="data-label">單 價</p><p class="data-val"><span id="val-unitPrice"></span><span style="font-size: 1rem;">萬/坪</span></p></div>
            <div class="data-card"><p class="data-label">總面積</p><p class="data-val"><span id="val-totalArea"></span><span style="font-size: 1rem;">坪</span></p></div>
        </div>

        <div class="photo-stack">
            <div class="photo-item">
                <p class="photo-caption">全區單元配置圖</p>
                <img src="48Unit-Map.jpg" onclick="openLightbox(this.src)">
            </div>
            <div class="photo-item">
                <p class="photo-caption">單元尺寸圖</p>
                <img src="45UnitsizeMap.jpg" onclick="openLightbox(this.src)">
            </div>
            <div class="photo-item">
                <p class="photo-caption">原地貌3D空拍</p>
                <img id="display-img-3d" src="" onclick="openLightbox(this.src)">
            </div>
        </div>

        <div class="table-wrap">
            <h3 class="serif" style="margin-bottom:15px;">單元面積明細</h3>
            <table>
                <thead><tr><th>地號</th><th>權狀面積(坪)</th><th>公設分配(坪)</th><th>合計總面積(坪)</th></tr></thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>

        <div class="rights-card">
            <h3>公設與會館信託權益</h3>
            <div>● 持分比例：<span id="display-share1" class="gold-highlight"></span></div>
            <p>內容包含社區大門、聯外道路、公設、公園及私人會館設施等權益保障。</p>
        </div>

        <div class="rights-card high-contrast">
            <h3>自益信託資產收益</h3>
            <div>● 持分比例：<span id="display-share2" class="gold-highlight"></span></div>
            <p>適用 487-223 地號及農地之處分收益分配。</p>
            <div style="margin-top:15px; padding-top:15px; border-top:1px solid #444;">
                <span style="color:var(--gold-accent)">預估可分配收益：</span>
                <span id="display-profit" style="font-size:1.4rem; font-weight:700;"></span> 萬
                <br><small>(依每坪 1.46 萬計算)</small>
            </div>
        </div>
    </main>

    <div id="lightbox" class="lightbox" onclick="this.style.display='none'"><img id="lightbox-img"></div>

    <script>
        const unitDatabase = {
            "C1": { "id": "C1", "title": "地號 487-07 ‧ 核心領袖單元", "price": "1,934.88", "unitPrice": "9.03", "totalArea": "214.22", "shareRatio": "1360 / 100,000", "imgDrone": "C1.png", "password": "1934", "landDetails": [ { "landId": "487-07", "rightsArea": "158.537", "publicArea": "55.687", "sumArea": "214.224" } ] },
            "C1-1": { "id": "C1-1", "title": "地號 487-08 ‧ 核心領袖單元", "price": "1,599.88", "unitPrice": "9.43", "totalArea": "169.62", "shareRatio": "1077 / 100,000", "imgDrone": "C1-1.png", "password": "1599", "landDetails": [ { "landId": "487-08", "rightsArea": "125.528", "publicArea": "44.092", "sumArea": "169.620" } ] },
            "C2": { "id": "C2", "title": "地號 487-20、487-21 ‧ 核心領袖單元", "price": "2,616.12", "unitPrice": "9.03", "totalArea": "289.65", "shareRatio": "1839 / 100,000", "imgDrone": "C2.png", "password": "2616", "landDetails": [ { "landId": "487-20", "rightsArea": "152.227", "publicArea": "53.470", "sumArea": "205.697" }, { "landId": "487-21", "rightsArea": "62.128", "publicArea": "21.822", "sumArea": "83.950" } ] },
            "C2-1": { "id": "C2-1", "title": "地號 487-21-1、487-22 ‧ 核心領袖單元", "price": "2,219.16", "unitPrice": "9.03", "totalArea": "245.7", "shareRatio": "1560 / 100,000", "imgDrone": "C2-1.png", "password": "2219", "landDetails": [ { "landId": "487-21-1", "rightsArea": "59.792", "publicArea": "21.002", "sumArea": "80.79" }, { "landId": "487-22", "rightsArea": "122.038", "publicArea": "42.866", "sumArea": "164.90" } ] },
            "C3": { "id": "C3", "title": "地號 487-23、487-24 ‧ 核心領袖單元", "price": "2,979.58", "unitPrice": "9.03", "totalArea": "329.89", "shareRatio": "2094 / 100,000", "imgDrone": "C3.png", "password": "2979", "landDetails": [ { "landId": "487-23", "rightsArea": "122.709", "publicArea": "43.102", "sumArea": "165.81" }, { "landId": "487-24", "rightsArea": "121.427", "publicArea": "42.651", "sumArea": "164.08" } ] }
        };

        const params = new URLSearchParams(window.location.search);
        const data = unitDatabase[params.get('id')];

        if (data) {
            document.getElementById('auth-hint').innerText = `請輸入編號 ${data.id} 之授權密碼`;
            document.getElementById('display-id').innerText = `認購單元 - ${data.id}`;
            document.getElementById('display-title').innerText = data.title;
            document.getElementById('val-price').innerText = data.price;
            document.getElementById('val-unitPrice').innerText = data.unitPrice;
            document.getElementById('val-totalArea').innerText = data.totalArea;
            document.getElementById('display-share1').innerText = data.shareRatio;
            document.getElementById('display-share2').innerText = data.shareRatio;
            document.getElementById('display-img-3d').src = data.imgDrone;

            // 計算分配收益 (面積 * 1.46)
            const profit = (parseFloat(data.totalArea) * 1.46).toFixed(2);
            document.getElementById('display-profit').innerText = profit;

            let rows = "";
            data.landDetails.forEach(item => {
                rows += `<tr><td>${item.landId}</td><td>${item.rightsArea}</td><td>${item.publicArea}</td><td>${item.sumArea}</td></tr>`;
            });
            document.getElementById('table-body').innerHTML = rows;
        }

        function validate() {
            if (data && document.getElementById('pass-input').value === data.password) {
                document.getElementById('auth-box').style.display = 'none';
                document.getElementById('protected-content').style.display = 'block';
                window.scrollTo(0,0);
            } else {
                document.getElementById('error').style.display = 'block';
            }
        }
        function openLightbox(src) { document.getElementById('lightbox-img').src = src; document.getElementById('lightbox').style.display = 'flex'; }
    </script>
</body>
</html>
