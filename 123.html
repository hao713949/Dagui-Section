<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>大貴段 • 兩萬坪共老莊園：一場關於「尊嚴養養老」與「資產定錨」建立的價值升級</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;900&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --forest-deep: #1B3022;
            --forest-mid: #3E5C46;
            --gold-accent: #b5a478;
            --paper-texture: #F9F8F4;
            --text-dark: #2C332D;
            --bg-dark-section: #0F1A13;
            --nav-height: 60px;
        }

        /* 基礎效能優化 */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { scroll-behavior: smooth; }
        body {
            background-color: var(--paper-texture);
            color: var(--text-dark);
            font-family: 'Noto Sans TC', sans-serif;
            line-height: 1.7;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        h1, h2, h3, h4, .serif { font-family: 'Noto Serif TC', serif; font-weight: 900; }

        /* --- 頂部導覽列 --- */
        .top-nav {
            position: fixed;
            top: 0; width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 10000;
            height: var(--nav-height);
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(27, 48, 34, 0.1);
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none;
        }
        .top-nav::-webkit-scrollbar { display: none; }
        .top-nav a {
            text-decoration: none;
            color: var(--forest-deep);
            font-size: 0.85rem;
            padding: 0 15px;
            font-weight: 700;
            transition: color 0.3s;
        }

        /* --- 輪播區域優化 --- */
        .main-carousel-section {
            padding-top: var(--nav-height);
            background: #000;
            position: relative;
            height: 75vh;
            min-height: 400px;
            overflow: hidden;
            /* 強制硬體加速 */
            transform: translateZ(0);
        }

        .carousel-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .carousel-slide {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: flex-end;
            padding: 0 0 40px 8%;
            /* 效能優化關鍵 */
            will-change: opacity;
        }

        .carousel-slide.active { 
            opacity: 1; 
            visibility: visible;
        }

        .carousel-slide::after {
            content: "";
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 50%;
            background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);
            pointer-events: none;
        }

        .slide-tag {
            position: relative;
            z-index: 5;
            color: var(--gold-accent);
            background: rgba(27, 48, 34, 0.85);
            padding: 8px 20px;
            font-size: 1rem;
            letter-spacing: 2px;
            border-left: 4px solid var(--gold-accent);
        }

        /* --- 內文區域 --- */
        .hero-intro { padding: 60px 8%; }
        .hero-intro h1 { font-size: clamp(2rem, 7vw, 3.5rem); color: var(--forest-deep); line-height: 1.2; margin-bottom: 20px; }
        
        .query-btn {
            display: inline-block;
            margin-top: 25px;
            padding: 16px 32px;
            background: var(--forest-deep);
            color: var(--gold-accent);
            text-decoration: none;
            border-radius: 4px;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* 通用卡片與格狀佈局 */
        section { padding: 60px 8%; }
        .grid-layout { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .info-card { background: #fff; padding: 25px; border-radius: 4px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }

        /* 圖資優化 */
        .clickable-map { 
            width: 100%; 
            height: auto; 
            cursor: zoom-in; 
            transition: transform 0.3s ease;
            display: block;
        }
        .clickable-map:hover { transform: scale(1.01); }

        /* 燈箱優化 */
        .lightbox-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 20000;
            padding: 10px;
        }
        .lightbox-overlay img { max-width: 100%; max-height: 95vh; object-fit: contain; }

        /* RWD 手機端調整 */
        @media (max-width: 768px) {
            .main-carousel-section { height: 50vh; }
            .hero-intro { padding: 40px 6%; }
            section { padding: 40px 6%; }
            .reg-grid { 
                display: grid; 
                grid-template-columns: repeat(2, 1fr); 
                gap: 10px; 
            }
            .reg-box { padding: 20px 10px; }
            .top-nav a { padding: 0 10px; font-size: 0.8rem; }
        }

        /* 表格響應式 */
        .table-container { overflow-x: auto; background: white; border-radius: 8px; }
        table { width: 100%; min-width: 600px; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        .total-row { background: #f9f9f9; font-weight: bold; }
    </style>
</head>
<body>

    <div id="lightbox" class="lightbox-overlay" onclick="closeLightbox()">
        <img id="lightbox-img" src="" alt="放大圖示">
    </div>

    <nav class="top-nav">
        <a href="#page1">首頁</a>
        <a href="#page2">核心理念</a>
        <a href="#page3">建築規範</a>
        <a href="#page4">圖資證明</a>
        <a href="#page5">土地分類</a>
        <a href="#page7">交易安全</a>
        <a href="#market-info">市場資訊</a>
    </nav>

    <header class="main-carousel-section" id="page1">
        <div class="carousel-container" id="mainCarousel">
            <div class="carousel-slide active" style="background-image: url('https://raw.githubusercontent.com/hao713949/Dagui-Section/main/IMG_6480.JPG')">
                <span class="slide-tag">會館示意圖</span>
            </div>
            <div class="carousel-slide" data-bg="https://raw.githubusercontent.com/hao713949/Dagui-Section/main/IMG_6481.JPG">
                <span class="slide-tag">會館示意圖</span>
            </div>
            <div class="carousel-slide" data-bg="https://raw.githubusercontent.com/hao713949/Dagui-Section/main/IMG_6482.JPG">
                <span class="slide-tag">會館示意圖</span>
            </div>
            <div class="carousel-slide" data-bg="https://raw.githubusercontent.com/hao713949/Dagui-Section/main/vaiil01.jpg">
                <span class="slide-tag">森活工藝</span>
            </div>
            <div class="carousel-slide" data-bg="https://raw.githubusercontent.com/hao713949/Dagui-Section/main/vaiil1.jpg">
                <span class="slide-tag">森活工藝</span>
            </div>
        </div>
    </header>

    <section class="hero-intro">
        <span class="serif" style="color:var(--forest-mid); letter-spacing: 2px;">尊嚴養老 ‧ 資產定錨 ‧ 價值升級</span>
        <h1 class="serif">兩萬坪共老莊園</h1>
        <p>與知己共老，在森林裡預約世外桃源</p>
        <a href="https://hao713949.github.io/DAKENG-VILLA/project/unit.html" class="query-btn">認購單元資料查詢 ⇄</a>
    </section>

    <section id="page4">
        <span class="section-tag">SITE DOCUMENTATION</span>
        <h2>地籍圖資與分區證明</h2>
        <div style="background:#fff; padding: 15px; border: 1px solid #eee; margin-bottom: 20px;">
             <img src="map.webp" alt="地籍圖示" class="clickable-map" onclick="openLightbox(this.src)" loading="lazy">
        </div>
    </section>

    <script>
        // 1. 輪播邏輯優化：延遲載入背景圖與觸控支援
        const slides = document.querySelectorAll('.carousel-slide');
        let currentSlide = 0;
        let startX = 0;

        // 動態載入圖片函數
        function loadSlideBg(slide) {
            const bg = slide.getAttribute('data-bg');
            if (bg) {
                slide.style.backgroundImage = `url('${bg}')`;
                slide.removeAttribute('data-bg');
            }
        }

        function showSlide(index) {
            slides[currentSlide].classList.remove('active');
            currentSlide = (index + slides.length) % slides.length;
            loadSlideBg(slides[currentSlide]); // 切換時才載入圖檔
            slides[currentSlide].classList.add('active');
        }

        // 自動播放
        let slideInterval = setInterval(() => showSlide(currentSlide + 1), 5000);

        // 手機觸控支援
        const container = document.getElementById('mainCarousel');
        container.addEventListener('touchstart', e => {
            startX = e.touches[0].clientX;
            clearInterval(slideInterval);
        }, {passive: true});

        container.addEventListener('touchend', e => {
            const endX = e.changedTouches[0].clientX;
            if (startX - endX > 50) showSlide(currentSlide + 1);
            else if (endX - startX > 50) showSlide(currentSlide - 1);
            slideInterval = setInterval(() => showSlide(currentSlide + 1), 5000);
        }, {passive: true});

        // 預載第二張圖
        window.addEventListener('load', () => {
            if(slides.length > 1) loadSlideBg(slides[1]);
        });

        // 2. 燈箱邏輯
        function openLightbox(src) {
            const lb = document.getElementById('lightbox');
            const img = document.getElementById('lightbox-img');
            img.src = src;
            lb.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
            document.body.style.overflow = 'auto';
        }
    </script>
</body>
</html>
