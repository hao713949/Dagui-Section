<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>合購案專案展示</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        :root {
            --main-bg: #f4f4f4;
            --text-dark: #333;
            --accent: #d4af37; /* 金色調，提升質感 */
        }

        body {
            margin: 0;
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: var(--main-bg);
        }

        .project-container {
            max-width: 1000px;
            margin: 50px auto;
            padding: 20px;
        }

        /* 主圖區域 */
        .main-swiper {
            width: 100%;
            height: 500px;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .main-swiper .swiper-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* 照片標題樣式 - 100% 保留 */
        .photo-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
            color: white;
            padding: 40px 20px 20px;
            pointer-events: none;
            z-index: 10;
        }

        .photo-title {
            font-size: 1.2rem;
            letter-spacing: 2px;
            font-weight: 500;
        }

        /* 縮圖區域 */
        .thumb-swiper {
            margin-top: 15px;
            height: 100px;
            box-sizing: border-box;
        }

        .thumb-swiper .swiper-slide {
            width: 25%;
            height: 100%;
            opacity: 0.4;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        .thumb-swiper .swiper-slide-thumb-active {
            opacity: 1;
            border: 2px solid var(--accent);
        }

        .thumb-swiper .swiper-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 2px;
        }

        /* 自定義箭頭顏色 - 100% 保留 */
        .swiper-button-next, .swiper-button-prev {
            color: #fff;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        @media (max-width: 768px) {
            .main-swiper { height: 350px; }
        }
    </style>
</head>
<body>

<div class="project-container">
    <div class="swiper main-swiper">
        <div class="swiper-wrapper">
            <div class="swiper-slide">
                <img src="https://raw.githubusercontent.com/hao713949/Dagui-Section/main/IMG_6480.JPG" alt="會館示意圖">
                <div class="photo-info"><div class="photo-title">會館示意圖</div></div>
            </div>
            <div class="swiper-slide">
                <img src="https://raw.githubusercontent.com/hao713949/Dagui-Section/main/IMG_6481.JPG" alt="會館示意圖">
                <div class="photo-info"><div class="photo-title">會館示意圖</div></div>
            </div>
            <div class="swiper-slide">
                <img src="https://raw.githubusercontent.com/hao713949/Dagui-Section/main/IMG_6482.JPG" alt="會館示意圖">
                <div class="photo-info"><div class="photo-title">會館示意圖</div></div>
            </div>
            <div class="swiper-slide">
                <img src="https://raw.githubusercontent.com/hao713949/Dagui-Section/main/IMG_6484.JPG" alt="會館示意圖">
                <div class="photo-info"><div class="photo-title">會館示意圖</div></div>
            </div>

            <div class="swiper-slide">
                <img src="https://raw.githubusercontent.com/hao713949/Dagui-Section/main/vaiil01.jpg" alt="森活工藝">
                <div class="photo-info"><div class="photo-title">森活工藝</div></div>
            </div>
            <div class="swiper-slide">
                <img src="https://raw.githubusercontent.com/hao713949/Dagui-Section/main/vaiil3.jpg" alt="森活工藝">
                <div class="photo-info"><div class="photo-title">森活工藝</div></div>
            </div>
            <div class="swiper-slide">
                <img src="https://raw.githubusercontent.com/hao713949/Dagui-Section/main/vaiil1.jpg" alt="森活工藝">
                <div class="photo-info"><div class="photo-title">森活工藝</div></div>
            </div>
            <div class="swiper-slide">
                <img src="https://raw.githubusercontent.com/hao713949/Dagui-Section/main/vaiil2.jpg" alt="森活工藝">
                <div class="photo-info"><div class="photo-title">森活工藝</div></div>
            </div>
            <div class="swiper-slide">
                <img src="https://raw.githubusercontent.com/hao713949/Dagui-Section/main/vaiil4.jpg" alt="森活工藝">
                <div class="photo-info"><div class="photo-title">森活工藝</div></div>
            </div>
        </div>
        <div class="swiper-button-next"></div>
        <div class="swiper-button-prev"></div>
    </div>

    <div class="swiper thumb-swiper">
        <div class="swiper-wrapper">
            <div class="swiper-slide"><img src="https://raw.githubusercontent.com/hao713949/Dagui-Section/main/IMG_6480.JPG"></div>
            <div class="swiper-slide"><img src="https://raw.githubusercontent.com/hao713949/Dagui-Section/main/IMG_6481.JPG"></div>
            <div class="swiper-slide"><img src="https://raw.githubusercontent.com/hao713949/Dagui-Section/main/IMG_6482.JPG"></div>
            <div class="swiper-slide"><img src="https://raw.githubusercontent.com/hao713949/Dagui-Section/main/IMG_6484.JPG"></div>
            <div class="swiper-slide"><img src="https://raw.githubusercontent.com/hao713949/Dagui-Section/main/vaiil01.jpg"></div>
            <div class="swiper-slide"><img src="https://raw.githubusercontent.com/hao713949/Dagui-Section/main/vaiil3.jpg"></div>
            <div class="swiper-slide"><img src="https://raw.githubusercontent.com/hao713949/Dagui-Section/main/vaiil1.jpg"></div>
            <div class="swiper-slide"><img src="https://raw.githubusercontent.com/hao713949/Dagui-Section/main/vaiil2.jpg"></div>
            <div class="swiper-slide"><img src="https://raw.githubusercontent.com/hao713949/Dagui-Section/main/vaiil4.jpg"></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
    // 初始化縮圖滑台 - 100% 保留原本功能
    var swiperThumbs = new Swiper(".thumb-swiper", {
        spaceBetween: 10,
        slidesPerView: 5, 
        freeMode: true,
        watchSlidesProgress: true,
        breakpoints: {
            320: { slidesPerView: 3 },
            768: { slidesPerView: 5 }
        }
    });

    // 初始化主展示滑台 - 100% 保留原本功能
    var swiperMain = new Swiper(".main-swiper", {
        spaceBetween: 10,
        navigation: {
            nextEl: ".swiper-button-next",
            prevEl: ".swiper-button-prev",
        },
        thumbs: {
            swiper: swiperThumbs, 
        },
        effect: "slide", 
        loop: true,
        autoplay: {
            delay: 5000,
            disableOnInteraction: false,
        }
    });
</script>

</body>
</html>
